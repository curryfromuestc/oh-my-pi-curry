name: Sync upstream

# Daily integration of upstream (can1357/oh-my-pi) and the workflow fork
# (PolyArch/oh-my-humanize) into this fork's main.
#
# The job merges the newest upstream v* tag and the workflow fork's main into
# main, validates the result on linux x64 (native build + typecheck + tests +
# smoke), and on success pushes straight to main. A merge conflict or a failed
# validation opens a tracking issue instead and leaves main untouched, so a
# broken upstream never lands silently. A manual run may override the upstream
# ref; the default is the newest v* tag (a release-gated checkpoint, not raw
# main).

on:
   schedule:
      - cron: "0 6 * * *" # daily 06:00 UTC
   workflow_dispatch:
      inputs:
         upstream_ref:
            description: "Upstream ref to merge (blank = latest v* tag)"
            type: string
            default: ""

concurrency:
   group: sync-upstream
   cancel-in-progress: false

permissions:
   contents: write
   issues: write

env:
   UPSTREAM_URL: https://github.com/can1357/oh-my-pi.git
   HZ_URL: https://github.com/PolyArch/oh-my-humanize.git

jobs:
   sync:
      runs-on: ubuntu-22.04
      timeout-minutes: 45
      steps:
         - uses: actions/checkout@v4
           with:
              fetch-depth: 0

         - name: Configure git identity
           run: |
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

         - name: Fetch upstream and workflow fork
           run: |
              git remote add upstream "$UPSTREAM_URL" 2>/dev/null || git remote set-url upstream "$UPSTREAM_URL"
              git remote add hz "$HZ_URL" 2>/dev/null || git remote set-url hz "$HZ_URL"
              git fetch --tags --prune upstream
              git fetch --prune hz

         - name: Resolve refs to merge
           id: refs
           run: |
              up="${{ inputs.upstream_ref }}"
              if [ -z "$up" ]; then
                 up=$(git tag -l 'v*' --sort=-v:refname | head -n1)
              fi
              if [ -z "$up" ]; then
                 echo "No upstream v* tag found" >&2
                 exit 1
              fi
              echo "upstream=$up" >> "$GITHUB_OUTPUT"
              echo "hz=$(git rev-parse --short hz/main)" >> "$GITHUB_OUTPUT"
              echo "Merging upstream=$up and hz/main=$(git rev-parse --short hz/main)"

         - name: Merge upstream and workflow fork into main
           id: merge
           run: |
              git checkout main
              base=$(git rev-parse HEAD)
              status=ok
              conflict_ref=""
              conflict_files=""
              for ref in "${{ steps.refs.outputs.upstream }}" hz/main; do
                 if ! git merge --no-edit "$ref"; then
                    conflict_ref="$ref"
                    conflict_files=$(git diff --name-only --diff-filter=U | tr '\n' ' ')
                    git merge --abort || true
                    status=conflict
                    echo "Conflict merging $ref: $conflict_files"
                    break
                 fi
              done
              proceed=false
              if [ "$status" = ok ] && [ "$(git rev-parse HEAD)" != "$base" ]; then
                 proceed=true
              fi
              {
                 echo "status=$status"
                 echo "conflict_ref=$conflict_ref"
                 echo "conflict_files=$conflict_files"
                 echo "proceed=$proceed"
              } >> "$GITHUB_OUTPUT"

         - name: Report merge conflict
           if: steps.merge.outputs.status == 'conflict'
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           run: |
              title="Sync blocked: merge conflict from upstream/hz"
              body=$(cat <<EOF
              Automated sync hit a merge conflict and was aborted; main is untouched.

              - Conflicting ref: \`${{ steps.merge.outputs.conflict_ref }}\`
              - Conflicting files: \`${{ steps.merge.outputs.conflict_files }}\`
              - Upstream ref: \`${{ steps.refs.outputs.upstream }}\`
              - hz/main: \`${{ steps.refs.outputs.hz }}\`
              - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

              Resolve locally:
              \`\`\`sh
              git fetch upstream --tags && git fetch hz
              git checkout main
              git merge ${{ steps.merge.outputs.conflict_ref }}   # resolve conflicts, commit
              git merge hz/main
              git push origin main
              \`\`\`
              EOF
              )
              existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number')
              if [ -n "$existing" ]; then
                 gh issue comment "$existing" --body "$body"
              else
                 gh issue create --title "$title" --body "$body" --label sync 2>/dev/null \
                    || gh issue create --title "$title" --body "$body"
              fi
              exit 1

         - name: Nothing to sync
           if: steps.merge.outputs.status == 'ok' && steps.merge.outputs.proceed == 'false'
           run: echo "Already up to date with upstream and hz; nothing to sync."

         - name: Setup bun
           if: steps.merge.outputs.proceed == 'true'
           uses: oven-sh/setup-bun@v2
           with:
              bun-version: "1.3"

         - name: Setup rust
           if: steps.merge.outputs.proceed == 'true'
           uses: dtolnay/rust-toolchain@nightly
           with:
              toolchain: nightly-2026-04-29

         - name: Cache cargo
           if: steps.merge.outputs.proceed == 'true'
           uses: Swatinem/rust-cache@v2
           with:
              shared-key: sync-linux-x64

         - name: Install system deps
           if: steps.merge.outputs.proceed == 'true'
           run: |
              sudo apt-get update
              sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep imagemagick
              sudo ln -sf "$(which fdfind)" /usr/local/bin/fd
              sudo ln -sf /usr/bin/convert /usr/local/bin/magick

         - name: Validate merged tree
           id: validate
           if: steps.merge.outputs.proceed == 'true'
           run: |
              bun install
              # Keep the merged lockfile consistent in the pushed commit.
              if ! git diff --quiet bun.lock; then
                 git add bun.lock
                 git commit -m "chore: refresh lockfile after sync"
              fi
              bun run build:native
              bun run ci:check:full
              bun run test:ts
              bun run ci:test:smoke

         - name: Push to main
           if: steps.merge.outputs.proceed == 'true'
           run: |
              # Fast-forward push; rejected if main moved meanwhile (next run retries).
              git push origin HEAD:main

         - name: Report validation failure
           if: failure() && steps.validate.outcome == 'failure'
           env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
           run: |
              title="Sync blocked: validation failed after merge"
              body=$(cat <<EOF
              The merge was clean but build, typecheck, or tests failed; main was not pushed.

              - Upstream ref: \`${{ steps.refs.outputs.upstream }}\`
              - hz/main: \`${{ steps.refs.outputs.hz }}\`
              - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

              Upstream likely changed an API the workflow integration depends on. Reconcile the seams (sdk.ts, session/agent-session.ts, task, slash-commands) locally, then push or rerun this workflow.
              EOF
              )
              existing=$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number')
              if [ -n "$existing" ]; then
                 gh issue comment "$existing" --body "$body"
              else
                 gh issue create --title "$title" --body "$body" --label sync 2>/dev/null \
                    || gh issue create --title "$title" --body "$body"
              fi
